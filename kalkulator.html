<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Tabliczka Mnożenia</title>

<style>
body {
    background: linear-gradient(135deg, #ff9ecf, #ffcce6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
}

.container {
    background: #ffe6f2;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 15px 30px rgba(255, 20, 147, 0.3);
}

h2 {
    text-align: center;
    color: #cc0066;
}

table {
    border-collapse: collapse;
    margin-top: 15px;
}

td, th {
    border: 2px solid #ff66b2;
    padding: 10px;
    text-align: center;
    min-width: 40px;
    font-weight: bold;
}

th {
    background-color: #ff66b2;
    color: white;
}

td {
    background-color: #fff0f6;
    color: #99004d;
}

td:hover {
    background-color: #ffb3d9;
    cursor: pointer;
}
    .fixed-back {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background-color: #f06292;
      color: white;
      padding: 12px 20px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      transition: background-color 0.3s, transform 0.2s;
      z-index: 1000;
    }

    .fixed-back:hover {
      background-color: #ec407a;
      transform: scale(1.05);
    }

</style>
</head>
<body>

<div class="container">
    <h2>Tabliczka Mnożenia 1–10</h2>
    <table id="tabliczka"></table>
</div>

<script>
const table = document.getElementById("tabliczka");

for (let i = 0; i <= 10; i++) {
    let row = document.createElement("tr");

    for (let j = 0; j <= 10; j++) {
        let cell;

        if (i === 0 && j === 0) {
            cell = document.createElement("th");
            cell.innerText = "×";
        } 
        else if (i === 0) {
            cell = document.createElement("th");
            cell.innerText = j;
        } 
        else if (j === 0) {
            cell = document.createElement("th");
            cell.innerText = i;
        } 
        else {
            cell = document.createElement("td");
            cell.innerText = i * j;
        }

        row.appendChild(cell);
    }

    table.appendChild(row);
}
</script>
<a class="fixed-back" href="JS.html"> 🠔 Powrót</a>
</body>
</html>
