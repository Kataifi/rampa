<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Różowy Kalkulator</title>

<style>
body {
    background: linear-gradient(135deg, #ff9ecf, #ffcce6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
}

.kalkulator {
    background: #ffe6f2;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 15px 30px rgba(255, 20, 147, 0.3);
    width: 320px;
}

#wynik {
    width: 100%;
    height: 60px;
    border: none;
    border-radius: 15px;
    margin-bottom: 15px;
    text-align: right;
    font-size: 26px;
    padding: 10px;
    background: #fff0f6;
    color: #cc0066;
    box-sizing: border-box;
}

.przyciski {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 60px;
    border: none;
    border-radius: 15px;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    background: #ff66b2;
    color: white;
}

button:hover {
    transform: scale(1.05);
    background: #ff3385;
}

.operator {
    background: #ff1493;
}

.operator:hover {
    background: #e60073;
}

.equal {
    background: #ff85c1;
    grid-row: span 2;
}

.equal:hover {
    background: #ff4da6;
}

.zero {
    grid-column: span 2;
}

.clear {
    background: #ffb3d9;
    color: #99004d;
}

.clear:hover {
    background: #ff80bf;
}
    .fixed-back {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background-color: #f06292;
      color: white;
      padding: 12px 20px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      transition: background-color 0.3s, transform 0.2s;
      z-index: 1000;
    }

    .fixed-back:hover {
      background-color: #ec407a;
      transform: scale(1.05);
    }

</style>
</head>
<body>

<div class="kalkulator">
    <input type="text" id="wynik" disabled>

    <div class="przyciski">
        <button class="clear" onclick="czysc()">C</button>
        <button onclick="dodaj('(')">(</button>
        <button onclick="dodaj(')')">)</button>
        <button class="operator" onclick="dodaj('/')">÷</button>

        <button onclick="dodaj('7')">7</button>
        <button onclick="dodaj('8')">8</button>
        <button onclick="dodaj('9')">9</button>
        <button class="operator" onclick="dodaj('*')">×</button>

        <button onclick="dodaj('4')">4</button>
        <button onclick="dodaj('5')">5</button>
        <button onclick="dodaj('6')">6</button>
        <button class="operator" onclick="dodaj('-')">−</button>

        <button onclick="dodaj('1')">1</button>
        <button onclick="dodaj('2')">2</button>
        <button onclick="dodaj('3')">3</button>
        <button class="operator" onclick="dodaj('+')">+</button>

        <button class="zero" onclick="dodaj('0')">0</button>
        <button onclick="dodaj('.')">.</button>
        <button class="equal" onclick="oblicz()">=</button>
    </div>
</div>

<script>
function dodaj(wartosc) {
    document.getElementById("wynik").value += wartosc;
}

function czysc() {
    document.getElementById("wynik").value = "";
}

function oblicz() {
    try {
        document.getElementById("wynik").value =
            eval(document.getElementById("wynik").value);
    } catch {
        alert("Błąd w działaniu!");
    }
}
</script>
<a class="fixed-back" href="JS.html">🠔 Powrót</a>
</body>
</html>
