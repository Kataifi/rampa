<!DOCTYPE HTML>
<html lang="pl">
<head>
<meta charset="utf-8">

<style>

body{
    background: linear-gradient(270deg,#ffe6f0,#ffd6e7,#fff0f5);
    background-size:600% 600%;
    animation:tlo 10s ease infinite;
    font-family:Arial, sans-serif;
    text-align:center;
    padding-top:60px;
    overflow:hidden;
}

/* animowane tło */
@keyframes tlo{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

h1{
    color:#cc6699;
}

a{
    display:inline-block;
    padding:12px 20px;
    background:#ffd6e7;
    color:#993366;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

a:hover{
    background:#ffb6d9;
    transform:scale(1.1);
}

.text{
    margin-top:20px;
    font-size:20px;
    color:#993366;
}

/* animacja spadania misiów */
@keyframes spadanie{
    0%{transform:translateY(-50px);}
    100%{transform:translateY(110vh);}
}

.mis{
    position:fixed;
    top:-50px;
    font-size:30px;
    animation:spadanie 6s linear;
}

</style>
</head>

<body>

<h1>Console.log</h1>

<a href="JS.html">Powrót</a>

<div class="text">Sprawdź konsolę (F12)</div>

<script>
console.log("Działa");

/* tworzenie animowanych misiów */
function stworzMisia(){
    const mis = document.createElement("div");
    mis.innerHTML = "🧸";
    mis.classList.add("mis");
    mis.style.left = Math.random() * window.innerWidth + "px";
    mis.style.fontSize = (Math.random()*20 + 20) + "px";

    document.body.appendChild(mis);

    setTimeout(()=>{
        mis.remove();
    },6000);
}

setInterval(stworzMisia,700);
</script>

</body>
</html>
