<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Perfumy</title>

<style>
body{
    background-color:#ffe6f0;
    font-family: Arial, sans-serif;
    text-align:center;
}

h1{
    color:#cc6699;
}

.container{
    background-color:#fff0f5;
    width:400px;
    margin:auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.perfum{
    background-color:#ffd6e7;
    margin:8px;
    padding:10px;
    border-radius:6px;
}
    .fixed-back {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background-color: #f06292;
      color: white;
      padding: 12px 20px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      transition: background-color 0.3s, transform 0.2s;
      z-index: 1000;
    }

    .fixed-back:hover {
      background-color: #ec407a;
      transform: scale(1.05);
    }
</style>

</head>
<body>

<h1>Lista Perfum</h1>

<div class="container" id="lista"></div>

<script>
const perfumy = {
  Dior: "Miss Dior",
  Chanel: "Coco Mademoiselle",
  Armani: "Si",
  Versace: "Bright Cristal",
  CarolinaHerrera: "Good Girl",
  YvesSaintLaurent: "Libre",
  TomFord: "Lost Cherry"
};

console.log(perfumy["Dior"]);      
console.log(perfumy.Chanel);       

const lista = document.getElementById("lista");

for (let marka in perfumy) {
    const div = document.createElement("div");
    div.className = "perfum";
    div.innerHTML = "<b>" + marka + "</b> – " + perfumy[marka];
    lista.appendChild(div);
}
</script>
<a class="fixed-back" href="JS.html">🠔 Powrót</a>
</body>
</html>
