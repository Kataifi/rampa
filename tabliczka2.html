<!DOCTYPE html> 
<html lang="pl"> 
<head> 
<meta charset="UTF-8"> 
<title>Tabliczka Mnożenia</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(270deg,#ffe6f0,#ffd6e7,#fff0f5);
    background-size: 600% 600%;
    animation: tlo 10s ease infinite;
    padding-top:40px;
}

@keyframes tlo{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

h1{
    color:#cc6699;
    animation: pojawienie 2s ease;
}

@keyframes pojawienie{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

table{
    margin:auto;
    border-collapse:collapse;
    margin-top:30px;
}

td{
    border:1px solid #ffb6d9;
    padding:12px;
    background-color:#ffd6e7;
    transition:0.3s;
    font-weight:bold;
}

/* animacja komórek */
td:hover{
    background-color:#ffb6d9;
    transform:scale(1.2);
}

a{
    display:inline-block;
    margin-top:30px;
    padding:10px 20px;
    background:#ffd6e7;
    color:#993366;
    text-decoration:none;
    border-radius:10px;
    transition:0.3s;
}

a:hover{
    transform:scale(1.1);
    background:#ffb6d9;
}

</style>

</head>

<body>

<h1>Tabliczka Mnożenia</h1>

<div id="tabliczka"></div>

<script>

function generujTabliczkeMnozenia(rozmiar){
    let tabliczka = [];

    for(let i=1;i<=rozmiar;i++){
        let wiersz = [];
        for(let j=1;j<=rozmiar;j++){
            wiersz.push(i*j);
        }
        tabliczka.push(wiersz);
    }

    return tabliczka;
}

function wyswietlTabliczke(tabliczka){
    let html = "<table>";

    for(let wiersz of tabliczka){
        html += "<tr>";
        for(let komorka of wiersz){
            html += "<td>"+komorka+"</td>";
        }
        html += "</tr>";
    }

    html += "</table>";

    document.getElementById("tabliczka").innerHTML = html;
}

let tab = generujTabliczkeMnozenia(10);
wyswietlTabliczke(tab);

</script>

<br>
<a href="JS.html">Powrót</a>

</body>
</html>
